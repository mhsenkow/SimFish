# Build walstad loom for macOS, Windows, and Linux when you push a version tag (v*).
# Artifacts are attached to the matching GitHub Release.
#
# Create a release:
#   git tag v0.1.30
#   git push origin v0.1.30
#
# Or: Actions → Release builds → Run workflow (builds only; no Release unless tagged).

name: Release builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  GODOT_VERSION: 4.6.3-stable
  # Folder name inside export_templates/*.tpz and on disk.
  GODOT_TEMPLATES_DIR: 4.6.3.stable
  PROJECT_PATH: shaders-godot/godot-project
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  export:
    name: Export ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            runner: macos-latest
            preset: macOS
            artifact: walstad-loom-mac.zip
          - name: Windows
            runner: windows-latest
            preset: Windows Desktop
            artifact: walstad-loom-windows.zip
          - name: Linux
            runner: ubuntu-latest
            preset: Linux
            artifact: walstad-loom-linux.tar.gz
          - name: Android
            runner: ubuntu-latest
            preset: Android
            artifact: walstad-loom.apk

    steps:
      - uses: actions/checkout@v5

      - name: Install GodotSteam (desktop)
        if: matrix.name != 'Android'
        shell: bash
        run: bash steam/install_godotsteam.sh

      - name: Install Godot + export templates (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1 libx11-6 libxcursor1 libxinerama1 libxrandr2 \
            libxi6 libglu1-mesa libasound2t64
          mkdir -p "$HOME/godot" "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATES_DIR}"
          cd "$HOME/godot"
          curl -fsSL -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q godot.zip
          curl -fsSL -o templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          # .tpz unpacks to templates/macos.zip etc.; Godot wants those files
          # directly under export_templates/4.6.3.stable/, not in a subfolder.
          tpl_tmp="$(mktemp -d)"
          unzip -q templates.tpz -d "$tpl_tmp"
          mv "$tpl_tmp"/templates/* "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATES_DIR}/"
          rm -rf "$tpl_tmp"
          echo "GODOT_BIN=$HOME/godot/Godot_v${GODOT_VERSION}_linux.x86_64" >> "$GITHUB_ENV"

      - name: Install Android SDK + debug keystore
        if: matrix.name == 'Android'
        run: |
          # Install Android SDK command-line tools.
          sudo apt-get install -y --no-install-recommends openjdk-17-jdk-headless
          export ANDROID_HOME="$HOME/android-sdk"
          mkdir -p "$ANDROID_HOME/cmdline-tools"
          cd /tmp
          curl -fsSL -o cmdline-tools.zip \
            "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          unzip -q cmdline-tools.zip
          mv cmdline-tools "$ANDROID_HOME/cmdline-tools/latest"
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "build-tools;34.0.0" "platforms;android-34"
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
          # Generate a debug keystore so the APK is signed for sideloading.
          mkdir -p "$HOME/.android"
          keytool -genkey -v -keystore "$HOME/.android/debug.keystore" \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          # Tell Godot where Android SDK + keystore live via editor_settings.
          mkdir -p "$HOME/.config/godot"
          cat > "$HOME/.config/godot/editor_settings-4.tres" <<'EOF'
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "ANDROID_HOME_PLACEHOLDER"
          export/android/debug_keystore = "HOME_PLACEHOLDER/.android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF
          sed -i "s|ANDROID_HOME_PLACEHOLDER|$ANDROID_HOME|g" "$HOME/.config/godot/editor_settings-4.tres"
          sed -i "s|HOME_PLACEHOLDER|$HOME|g" "$HOME/.config/godot/editor_settings-4.tres"

      - name: Install Godot + export templates (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p "$HOME/godot" "$HOME/Library/Application Support/Godot/export_templates/${GODOT_TEMPLATES_DIR}"
          cd "$HOME/godot"
          curl -fsSL -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_macos.universal.zip"
          unzip -q godot.zip
          curl -fsSL -o templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          tpl_tmp="$(mktemp -d)"
          unzip -q templates.tpz -d "$tpl_tmp"
          mv "$tpl_tmp"/templates/* "$HOME/Library/Application Support/Godot/export_templates/${GODOT_TEMPLATES_DIR}/"
          rm -rf "$tpl_tmp"
          echo "GODOT_BIN=$HOME/godot/Godot.app/Contents/MacOS/Godot" >> "$GITHUB_ENV"

      - name: Install Godot + export templates (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $godotRoot = "$env:USERPROFILE\godot"
          $templatesRoot = "$env:APPDATA\Godot\export_templates\${env:GODOT_TEMPLATES_DIR}"
          New-Item -ItemType Directory -Force -Path $godotRoot, $templatesRoot | Out-Null
          Set-Location $godotRoot
          Invoke-WebRequest -Uri "https://github.com/godotengine/godot/releases/download/${env:GODOT_VERSION}/Godot_v${env:GODOT_VERSION}_win64.exe.zip" -OutFile godot.zip
          Expand-Archive -Path godot.zip -DestinationPath . -Force
          Invoke-WebRequest -Uri "https://github.com/godotengine/godot/releases/download/${env:GODOT_VERSION}/Godot_v${env:GODOT_VERSION}_export_templates.tpz" -OutFile templates.tpz
          $tplTmp = Join-Path $env:TEMP "godot-export-templates"
          if (Test-Path $tplTmp) { Remove-Item -Recurse -Force $tplTmp }
          Expand-Archive -Path templates.tpz -DestinationPath $tplTmp -Force
          Move-Item -Path (Join-Path $tplTmp "templates\*") -Destination $templatesRoot -Force
          Remove-Item -Recurse -Force $tplTmp
          "GODOT_BIN=$godotRoot\Godot_v${env:GODOT_VERSION}_win64.exe" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Import project assets
        shell: bash
        run: |
          "$GODOT_BIN" --headless --path "${{ env.PROJECT_PATH }}" --import

      - name: Export release build
        shell: bash
        run: |
          mkdir -p build
          if [ "${{ matrix.preset }}" == "Android" ]; then
            "$GODOT_BIN" --headless --path "${{ env.PROJECT_PATH }}" --export-debug "${{ matrix.preset }}"
          else
            "$GODOT_BIN" --headless --path "${{ env.PROJECT_PATH }}" --export-release "${{ matrix.preset }}"
            cp "${{ env.PROJECT_PATH }}/steam_appid.txt" build/
          fi

      - name: Package macOS
        if: matrix.name == 'macOS'
        run: |
          mkdir -p artifacts build/WalstadLoom.app/Contents/MacOS
          cp shaders-godot/godot-project/steam_appid.txt build/WalstadLoom.app/Contents/MacOS/
          cd build
          zip -r ../artifacts/walstad-loom-mac.zip WalstadLoom.app

      - name: Package Windows
        if: matrix.name == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path build\* -DestinationPath artifacts\walstad-loom-windows.zip -Force

      - name: Package Linux
        if: matrix.name == 'Linux'
        run: |
          chmod +x build/WalstadLoom-linux.x86_64
          mkdir -p artifacts
          tar -czf artifacts/walstad-loom-linux.tar.gz -C build WalstadLoom-linux.x86_64 steam_appid.txt

      - name: Package Android
        if: matrix.name == 'Android'
        run: |
          mkdir -p artifacts
          cp build/WalstadLoom.apk artifacts/walstad-loom.apk

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: export
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
