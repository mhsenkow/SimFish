# Build Vivarium for macOS, Windows, and Linux when you push a version tag (v*).
# Artifacts are attached to the matching GitHub Release.
#
# Create a release:
#   git tag v0.1.30
#   git push origin v0.1.30
#
# Or: Actions → Release builds → Run workflow (builds only; no Release unless tagged).

name: Release builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  GODOT_VERSION: 4.6.3-stable
  # Folder name inside export_templates/*.tpz and on disk.
  GODOT_TEMPLATES_DIR: 4.6.3.stable
  PROJECT_PATH: shaders-godot/godot-project
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  export:
    name: Export ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            runner: macos-latest
            preset: macOS
            artifact: Vivarium-mac.zip
          - name: Windows
            runner: windows-latest
            preset: Windows Desktop
            artifact: Vivarium-windows.zip
          - name: Linux
            runner: ubuntu-latest
            preset: Linux
            artifact: Vivarium-linux.tar.gz

    steps:
      - uses: actions/checkout@v5

      - name: Install Godot + export templates (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1 libx11-6 libxcursor1 libxinerama1 libxrandr2 \
            libxi6 libglu1-mesa libasound2t64
          mkdir -p "$HOME/godot" "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATES_DIR}"
          cd "$HOME/godot"
          curl -fsSL -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q godot.zip
          curl -fsSL -o templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          # .tpz unpacks to templates/macos.zip etc.; Godot wants those files
          # directly under export_templates/4.6.3.stable/, not in a subfolder.
          tpl_tmp="$(mktemp -d)"
          unzip -q templates.tpz -d "$tpl_tmp"
          mv "$tpl_tmp"/templates/* "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATES_DIR}/"
          rm -rf "$tpl_tmp"
          echo "GODOT_BIN=$HOME/godot/Godot_v${GODOT_VERSION}_linux.x86_64" >> "$GITHUB_ENV"

      - name: Install Godot + export templates (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p "$HOME/godot" "$HOME/Library/Application Support/Godot/export_templates/${GODOT_TEMPLATES_DIR}"
          cd "$HOME/godot"
          curl -fsSL -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_macos.universal.zip"
          unzip -q godot.zip
          curl -fsSL -o templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          tpl_tmp="$(mktemp -d)"
          unzip -q templates.tpz -d "$tpl_tmp"
          mv "$tpl_tmp"/templates/* "$HOME/Library/Application Support/Godot/export_templates/${GODOT_TEMPLATES_DIR}/"
          rm -rf "$tpl_tmp"
          echo "GODOT_BIN=$HOME/godot/Godot.app/Contents/MacOS/Godot" >> "$GITHUB_ENV"

      - name: Install Godot + export templates (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $godotRoot = "$env:USERPROFILE\godot"
          $templatesRoot = "$env:APPDATA\Godot\export_templates\${env:GODOT_TEMPLATES_DIR}"
          New-Item -ItemType Directory -Force -Path $godotRoot, $templatesRoot | Out-Null
          Set-Location $godotRoot
          Invoke-WebRequest -Uri "https://github.com/godotengine/godot/releases/download/${env:GODOT_VERSION}/Godot_v${env:GODOT_VERSION}_win64.exe.zip" -OutFile godot.zip
          Expand-Archive -Path godot.zip -DestinationPath . -Force
          Invoke-WebRequest -Uri "https://github.com/godotengine/godot/releases/download/${env:GODOT_VERSION}/Godot_v${env:GODOT_VERSION}_export_templates.tpz" -OutFile templates.tpz
          $tplTmp = Join-Path $env:TEMP "godot-export-templates"
          if (Test-Path $tplTmp) { Remove-Item -Recurse -Force $tplTmp }
          Expand-Archive -Path templates.tpz -DestinationPath $tplTmp -Force
          Move-Item -Path (Join-Path $tplTmp "templates\*") -Destination $templatesRoot -Force
          Remove-Item -Recurse -Force $tplTmp
          "GODOT_BIN=$godotRoot\Godot_v${env:GODOT_VERSION}_win64.exe" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Import project assets
        shell: bash
        run: |
          "$GODOT_BIN" --headless --path "${{ env.PROJECT_PATH }}" --import

      - name: Export release build
        shell: bash
        run: |
          mkdir -p build
          "$GODOT_BIN" --headless --path "${{ env.PROJECT_PATH }}" --export-release "${{ matrix.preset }}"

      - name: Package macOS
        if: matrix.name == 'macOS'
        run: |
          mkdir -p artifacts
          cd build
          zip -r ../artifacts/Vivarium-mac.zip Vivarium.app

      - name: Package Windows
        if: matrix.name == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path build\* -DestinationPath artifacts\Vivarium-windows.zip -Force

      - name: Package Linux
        if: matrix.name == 'Linux'
        run: |
          chmod +x build/Vivarium-linux.x86_64
          mkdir -p artifacts
          tar -czf artifacts/Vivarium-linux.tar.gz -C build Vivarium-linux.x86_64

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: export
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
